apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-replication-setup
  namespace: {{ .Values.common.namespace }}
  labels:
    app: {{ .Chart.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mysql-pods
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Checking Primary Pod..."
              until nc -z -w 3 {{ .Chart.Name }}-statefulset-0.{{ .Chart.Name }}-headless.{{ .Values.common.namespace }}.svc.cluster.local 3306; do
                echo "Waiting for Primary DB Pod...";
                sleep 3;
              done;
              echo "Checking Replica Pod..."
              until nc -z -w 3 {{ .Chart.Name }}-statefulset-1.{{ .Chart.Name }}-headless.{{ .Values.common.namespace }}.svc.cluster.local 3306; do
                echo "Waiting for Replica DB Pod...";
                sleep 3;
              done;
      containers:
        - name: replication-setup
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          command: ["bash", "/mnt/config-map/replication.sh"]
          env:
            - name: CHART_NAME
              value: {{ .Chart.Name }}
            - name: MY_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database | quote }}
            {{- range $k, $v := .Values.mysql.secrets }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Chart.Name }}-secrets
                  key: {{ $k }}
            {{- end }}
          volumeMounts:
            - name: config-map
              mountPath: /mnt/config-map
      volumes:
        - name: config-map
          configMap:
            name: {{ .Chart.Name }}-configmap
            defaultMode: 0755