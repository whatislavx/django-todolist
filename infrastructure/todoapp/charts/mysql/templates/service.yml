apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-headless
  namespace: {{ .Values.common.namespace }}
spec:
  clusterIP: None
  selector:
    app: {{ .Chart.Name }}
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-primary
  namespace: {{ .Values.common.namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Chart.Name }}
    statefulset.kubernetes.io/pod-name: {{ .Chart.Name }}-statefulset-0
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306

---

apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-replica
  namespace: {{ .Values.common.namespace }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Chart.Name }}
    statefulset.kubernetes.io/pod-name: {{ .Chart.Name }}-statefulset-1
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306