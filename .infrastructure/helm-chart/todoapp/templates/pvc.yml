apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-{{ .Chart.Name }}  
  namespace: {{ .Values.common.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.todoapp.pvc.storageClassName | default "standard" }}
  resources:
    requests:
      storage: {{ .Values.todoapp.pvc.storage }}